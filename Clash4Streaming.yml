mixed-port: 7897
allow-lan: false
mode: rule
log-level: warning
# Clash4Streaming generic template
# Replace proxy-providers.Privilege.url with your own Clash/Mihomo-compatible subscription URL before use.
# Do not publish a file containing your real subscription token.
ipv6: false
unified-delay: true
tcp-concurrent: true
profile:
  store-selected: true
  store-fake-ip: true
proxy-providers:
  Privilege:
    type: http
    url: https://example.com/your-subscription-url
    path: ./proxy_provider/Privilege.yaml
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
proxy-groups:
- name: Group
  type: select
  proxies:
  - DIRECT
  - 🇭🇰Hong Kong
  - 🇸🇬Singapore
  - 🇺🇸United States
  - 🇯🇵Japan
  - 🇰🇷South Korea
  - 🇨🇳Taiwan
  - 🇬🇧United Kingdom
  - 🇩🇪Germany
  - 🇫🇷France
  - 🇦🇺Australia
  - 🇨🇦Canada
  - 🇲🇴Macau
  - 🇮🇳India
  - 🇲🇾Malaysia
  - 🇵🇭Philippines
  - 🇺🇳Rare Areas
- name: 🇭🇰Hong Kong
  type: url-test
  use:
  - Privilege
  filter: (?i)(🇭🇰|香港|Hong|HK)
  url: http://www.gstatic.com/generate_204
  interval: 300
- name: 🇸🇬Singapore
  type: url-test
  use:
  - Privilege
  filter: (?i)(🇸🇬|新加坡|🇸🇬Singapore|SG)
